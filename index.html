<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 바로가기 대시보드</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 40px; /* 배지가 사라진 만큼 하단 여백을 확보 */
            font-size: 2rem;
            color: #111827;
            font-weight: 800;
        }

        /* 기본 PC 디자인: 한 줄에 넓게 배치 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        /* 버튼 기본 스타일 */
        .link-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid transparent;
        }

        /* 호버 효과 (PC 전용) */
        @media (hover: hover) {
            .link-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            }
        }

        /* 브랜드별 포인트 컬러 */
        .vace44 { border-bottom-color: #ff6b6b; }
        .github { border-bottom-color: #24292e; }
        .google { border-bottom-color: #4a90e2; }
        .daum { border-bottom-color: #398fe5; }
        .naver { border-bottom-color: #03cf5d; }

        /* 📱 모바일 및 태블릿 맞춤형 레이아웃 (반응형) */
        @media (max-width: 900px) {
            body { padding: 20px; }
            h1 { 
                font-size: 1.6rem; 
                margin-bottom: 30px;
            }
            
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .link-card {
                padding: 30px 15px;
                font-size: 1.05rem;
                border: 2px solid #e5e7eb;
            }
            
            /* 마지막 홀수 카드가 있을 경우 꽉 차게 조절 */
            .link-card:last-child:nth-child(odd) {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <h1>스마트 대시보드</h1>

    <div class="grid-container">
        <div onclick="go('vace44')" class="link-card vace44">베이스44</div>
        <div onclick="go('github')" class="link-card github">GitHub</div>
        <div onclick="go('google')" class="link-card google">Google</div>
        <div onclick="go('daum')" class="link-card daum">Daum</div>
        <div onclick="go('naver')" class="link-card naver">Naver</div>
    </div>

    <script>
        // 1. 모바일 여부 판단 함수
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 2. 기기별 맞춤형 주소 데이터 설정
        const links = {
            vace44: {
                pc: "https://vace44.com",
                mobile: "https://vace44.com"
            },
            github: {
                pc: "https://github.com",
                mobile: "https://github.com"
            },
            google: {
                pc: "https://www.google.com",
                mobile: "https://www.google.com"
            },
            daum: {
                pc: "https://www.daum.net",
                mobile: "https://m.daum.net"
            },
            naver: {
                pc: "https://www.naver.com",
                mobile: "https://m.naver.com"
            }
        };

        // 3. 새 탭 열기 실행 함수
        function go(site) {
            const targetUrl = isMobile() ? links[site].mobile : links[site].pc;
            window.open(targetUrl, '_blank');
        }
    </script>
</body>
</html>
